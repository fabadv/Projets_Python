<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        .calculator-title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .display {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            font-weight: 500;
            word-wrap: break-word;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            color: #333;
        }

        .display.result {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f0f0f0;
            color: #333;
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.operator {
            background: #667eea;
            color: white;
        }

        button.operator:hover {
            background: #5568d3;
        }

        button.equals {
            background: #4caf50;
            color: white;
            grid-column: span 2;
        }

        button.equals:hover {
            background: #45a049;
        }

        button.clear {
            background: #f44336;
            color: white;
            grid-column: span 2;
        }

        button.clear:hover {
            background: #da190b;
        }

        .error {
            color: #f44336;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }

        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1 class="calculator-title">Calculator</h1>
        <div class="display" id="display">0</div>
        <div class="error" id="error"></div>

        <div class="buttons-grid">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('.')">,</button>

            <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="operator" onclick="appendOperator('(')">(</button>
            <button class="operator" onclick="appendOperator(')')">)</button>

            <button class="equals" onclick="calculate()">=</button>
        </div>

        <div class="info">Supports: numbers, +, −, ×, /, parentheses</div>
    </div>

    <script>
        let expression = '';
        let lastResult = null;

        function updateDisplay() {
            const display = document.getElementById('display');
            const errorDiv = document.getElementById('error');
            
            if (expression === '') {
                display.textContent = '0';
                display.classList.remove('result');
            } else {
                display.textContent = expression;
                display.classList.remove('result');
            }
            errorDiv.textContent = '';
        }

        function appendNumber(num) {
            expression += num;
            updateDisplay();
        }

        function appendOperator(op) {
            if (expression === '' && op !== '-' && op !== '(') return;
            if (op === '.') {
                op = '.';
            }
            expression += op;
            updateDisplay();
        }

        function clearDisplay() {
            expression = '';
            lastResult = null;
            updateDisplay();
        }

        function calculate() {
            if (expression === '') return;

            const display = document.getElementById('display');
            const errorDiv = document.getElementById('error');

            // Replace display operators with Python operators
            let pythonExpr = expression.replace(/×/g, '*').replace(/−/g, '-').replace(/,/g, '.');

            fetch('/api/calc', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ expression: pythonExpr })
            })
            .then(response => response.json())
            .then(data => {
                if (data.result !== undefined) {
                    lastResult = data.result;
                    expression = String(data.result);
                    display.textContent = data.result;
                    display.classList.add('result');
                    errorDiv.textContent = '';
                } else if (data.detail) {
                    errorDiv.textContent = 'Error: ' + data.detail;
                }
            })
            .catch(error => {
                errorDiv.textContent = 'Error: ' + error.message;
            });
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '+') appendOperator('+');
            else if (e.key === '-') appendOperator('-');
            else if (e.key === '*') appendOperator('×');
            else if (e.key === '/') { e.preventDefault(); appendOperator('/'); }
            else if (e.key === '(') appendOperator('(');
            else if (e.key === ')') appendOperator(')');
            else if (e.key === '.') appendOperator('.');
            else if (e.key === 'Enter') calculate();
            else if (e.key === 'Backspace') expression = expression.slice(0, -1), updateDisplay();
            else if (e.key === 'Escape') clearDisplay();
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
